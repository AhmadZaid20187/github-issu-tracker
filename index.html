<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Github Issu Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="./style.css">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>
    <main class="max-w-[90%] sm:max-w-[25%]  shadow-lg mx-auto sm:my-[200px]">
        <section>
            <div class="text-center">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
                <p>Sign in to manage your issues</p>
            </div>
            <!-- Form -->
            <div class="card-body mx-auto ">
                <fieldset class="fieldset space-y-3">
                    <div>
                        <label class="label text-black">Username</label>
                        <input id="inputUsername" type="username" class="input w-full" placeholder="Enter Username" />
                        <label class="label text-primary">Default: admin</label>
                    </div>
                    <div>
                        <label class="label text-black">Password</label>
                        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
                        <label class="label text-primary">Default: admin123</label>
                        <div><a class="link link-hover">Forgot password?</a></div>
                    </div>
                    <button class="btn btn-primary mt-4" id="loginBtn">Login</button>
                </fieldset>
            </div>
        </section>
    </main>
    <script src="./login.js"></script>
</body>

</html>
