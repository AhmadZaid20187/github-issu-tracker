<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issu Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="./style.css">

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awsome -->

        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="size-12" src="./assets/github-logo.png" alt="">GitHub
                    Issues
                    Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>NEW ISSU</button>
            </div>
        </div>
    </header>

    <main class="w-[70%] bg-[#F8FAFC]  mx-auto my-[60px]">


        <!-- Btn-ALL, Open, Closed -->
        <section class=" shadow-md p-5 rounded-xl gap-8 flex items-center">
            <button class="btn btn-primary px-10" onclick="loadIssues()" id="all">ALL</button>
            <button class="btn btn-primary px-9" onclick="opendBtn()" id="open">Open</button>
            <button class="btn btn-primary px-9" id="closed">Closed</button>
            <div id="openClosedBtn">
                <!-- The Open and Closed button will be in there -->

            </div>
        </section>

        <!-- Issu Count -->
        <section class="flex shadow-md p-5 rounded-t-xl-xl mt-6 items-center justify-between">
            <div class="flex gap-6">
                <img class="size-12" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-bold"><span>0</span>Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="items-center flex gap-2">
                    <div aria-label="status" class="status status-accent size-3"></div><span>Open</span>
                </div>
                <div class="items-center flex gap-2">
                    <div aria-label="status" class="status status-primary size-3"></div><span>Closed</span>
                </div>
            </div>
        </section>


        <!-- Issues Container -->
        <section id="issuesContainer" class="shadow-md rounded-xl grid sm:grid-cols-4 gap-4">
            <!-- Cards Dynamically Added Here -->
